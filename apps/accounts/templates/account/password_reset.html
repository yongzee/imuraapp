{% extends "account/base.html" %}
{% load i18n %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="mb-4 text-center">Reset Password</h3>
          <p class="text-muted">Enter your email address and we’ll send you instructions to reset your password.</p>
          <form method="post" action="{% url 'account_reset_password' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning w-100">Send Reset Email</button>
          </form>
          <p class="mt-3 text-center">
            <a href="{% url 'account_login' %}">Back to login</a>Back to login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
