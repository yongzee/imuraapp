<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IMURA - Pose Capture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  {% load static %}

  <style>
    /* ===== RESET ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== FULLSCREEN CONTAINER ===== */
    #fullscreen-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* ===== VIEWFINDER ===== */
    #viewfinder {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* ===== VIDEO (fills entire screen) ===== */
    #video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%) scaleX(-1);
    }

    /* ===== VIGNETTE (dark border around silhouette) ===== */
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 40% 75% at 50% 50%,
        transparent 0%,
        transparent 55%,
        rgba(0, 0, 0, 0.45) 75%,
        rgba(0, 0, 0, 0.7) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ===== SILHOUETTE CONTAINER (centered frame) ===== */
    #silhouette-container {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    /* ===== SILHOUETTE IMAGE ===== */
    #overlay {
      max-height: 72vh;
      max-width: 40vw;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0.7;
      filter:
        drop-shadow(0 0 20px rgba(255, 255, 255, 0.35))
        drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    /* When silhouette is active, make it glow */
    #overlay.active {
      opacity: 0.8;
      filter:
        drop-shadow(0 0 25px rgba(255, 255, 255, 0.5))
        drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
    }

    /* ===== GUIDELINE TEXT BUBBLE ===== */
    .guide-bubble {
      position: absolute;
      bottom: 22vh;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      white-space: nowrap;
      z-index: 5;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: opacity 0.3s ease;
    }

    /* ===== UI OVERLAY ===== */
    .ui-overlay {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .ui-top {
      top: 0;
      padding: 20px 20px 40px;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.85) 0%,
        rgba(0, 0, 0, 0.4) 60%,
        rgba(0, 0, 0, 0) 100%
      );
    }

    .ui-bottom {
      bottom: 0;
      padding: 40px 20px 30px;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.85) 0%,
        rgba(0, 0, 0, 0.4) 60%,
        rgba(0, 0, 0, 0) 100%
      );
    }

    /* ===== HEADER ===== */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .back-btn {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    h2 {
      color: #fff;
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      letter-spacing: 0.5px;
    }

    .step-indicator {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .step-dot.active {
      background: #28a745;
      box-shadow: 0 0 10px rgba(40, 167, 69, 0.6);
    }

    .step-dot.completed {
      background: #fff;
    }

    /* ===== STATUS TEXT ===== */
    #status {
      color: #e0e0e0;
      font-size: 15px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      padding: 0 15px;
      line-height: 1.4;
    }

    /* ===== CAPTURE BUTTON ===== */
    .capture-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #captureBtn {
      pointer-events: auto;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }

    #captureBtn::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: #fff;
      transition: all 0.15s ease;
    }

    #captureBtn:hover:not(:disabled)::after {
      background: #e0e0e0;
      transform: scale(0.95);
    }

    #captureBtn:active:not(:disabled)::after {
      transform: scale(0.85);
      background: #ccc;
    }

    #captureBtn:disabled {
      border-color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
    }

    #captureBtn:disabled::after {
      background: rgba(255, 255, 255, 0.3);
    }

    .capture-hint {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }

    /* ===== FLASH EFFECT ===== */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.08s ease;
    }

    #flash.active {
      opacity: 0.85;
    }

    /* ===== LOADING OVERLAY ===== */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      transition: opacity 0.3s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #28a745;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #fff;
      font-size: 16px;
    }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-wrapper {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrapper.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: #28a745;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ===== CORNER GUIDES ===== */
    .corner-guide {
      position: absolute;
      width: 30px;
      height: 30px;
      z-index: 4;
      pointer-events: none;
      opacity: 0.6;
    }

    .corner-guide.top-left {
      top: 12vh;
      left: calc(50% - 20vw);
      border-top: 3px solid rgba(255, 255, 255, 0.7);
      border-left: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 4px 0 0 0;
    }

    .corner-guide.top-right {
      top: 12vh;
      right: calc(50% - 20vw);
      border-top: 3px solid rgba(255, 255, 255, 0.7);
      border-right: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 0 4px 0 0;
    }

    .corner-guide.bottom-left {
      bottom: 12vh;
      left: calc(50% - 20vw);
      border-bottom: 3px solid rgba(255, 255, 255, 0.7);
      border-left: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 0 0 0 4px;
    }

    .corner-guide.bottom-right {
      bottom: 12vh;
      right: calc(50% - 20vw);
      border-bottom: 3px solid rgba(255, 255, 255, 0.7);
      border-right: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 0 0 4px 0;
    }

    /* ===== PULSE ANIMATION ON SILHOUETTE ===== */
    @keyframes silhouettePulse {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 0.85; }
    }

    #overlay.pulsing {
      animation: silhouettePulse 2s ease-in-out infinite;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      h2 {
        font-size: 20px;
      }

      #status {
        font-size: 14px;
      }

      #captureBtn {
        width: 68px;
        height: 68px;
      }

      .ui-top {
        padding: 15px 15px 35px;
      }

      .ui-bottom {
        padding: 35px 15px 25px;
      }

      /* Silhouette bigger on tablets */
      #overlay {
        max-height: 70vh;
        max-width: 50vw;
      }

      .guide-bubble {
        font-size: 13px;
        bottom: 20vh;
      }

      .corner-guide.top-left,
      .corner-guide.top-right {
        top: 10vh;
      }

      .corner-guide.bottom-left,
      .corner-guide.bottom-right {
        bottom: 10vh;
      }

      .corner-guide.top-left,
      .corner-guide.bottom-left {
        left: calc(50% - 25vw);
      }

      .corner-guide.top-right,
      .corner-guide.bottom-right {
        right: calc(50% - 25vw);
      }
    }

    @media (max-width: 480px) {
      h2 {
        font-size: 18px;
      }

      #status {
        font-size: 13px;
      }

      #captureBtn {
        width: 62px;
        height: 62px;
      }

      .back-btn {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      /* Silhouette fills more of mobile screen */
      #overlay {
        max-height: 65vh;
        max-width: 60vw;
      }

      .guide-bubble {
        font-size: 12px;
        padding: 6px 14px;
        bottom: 18vh;
      }

      .corner-guide {
        width: 24px;
        height: 24px;
      }
    }

    @media (max-height: 500px) {
      .ui-top {
        padding: 8px 12px 20px;
      }

      .ui-bottom {
        padding: 20px 12px 10px;
      }

      h2 {
        font-size: 16px;
      }

      #status {
        font-size: 12px;
      }

      #captureBtn {
        width: 56px;
        height: 56px;
      }

      #overlay {
        max-height: 60vh;
        max-width: 35vw;
      }

      .step-indicator {
        margin-top: 5px;
      }

      .guide-bubble {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Starting camera...</div>
  </div>

  <!-- Flash Effect -->
  <div id="flash"></div>

  <!-- Full Screen Camera -->
  <div id="fullscreen-container">

    <!-- Video Layer -->
    <div id="viewfinder">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <!-- Vignette (dark border for contrast) -->
    <div id="vignette"></div>

    <!-- Silhouette Frame -->
    <div id="silhouette-container">
      <img id="overlay" class="active" alt="Align your body here"/>
    </div>

    <!-- Corner Guides -->
    <div class="corner-guide top-left"></div>
    <div class="corner-guide top-right"></div>
    <div class="corner-guide bottom-left"></div>
    <div class="corner-guide bottom-right"></div>

    <!-- Guide Bubble -->
    <div class="guide-bubble" id="guideBubble">
      Stand back and align your body with the outline
    </div>

    <!-- Top UI -->
    <div class="ui-overlay ui-top">
      <div class="header-row">
        <button class="back-btn" onclick="goBack()" title="Go Back">
          <i class="bi bi-arrow-left"></i>
        </button>
        <h2 id="pageTitle">Front Pose</h2>
        <div style="width: 40px;"></div>
      </div>

      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
      </div>

      <div id="status">Initializing camera...</div>
    </div>

    <!-- Bottom UI -->
    <div class="ui-overlay ui-bottom">
      <div class="capture-wrapper">
        <div class="progress-bar-wrapper" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <button id="captureBtn" disabled></button>
        <div class="capture-hint" id="captureHint"></div>
      </div>
    </div>

  </div>

  <!-- Hidden Canvas -->
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    /* ========== DOM ELEMENTS ========== */
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const captureBtn = document.getElementById("captureBtn");
    const statusDiv = document.getElementById("status");
    const captureHint = document.getElementById("captureHint");
    const flash = document.getElementById("flash");
    const loadingOverlay = document.getElementById("loading-overlay");
    const dot1 = document.getElementById("dot1");
    const dot2 = document.getElementById("dot2");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const pageTitle = document.getElementById("pageTitle");
    const guideBubble = document.getElementById("guideBubble");

    /* ========== STATE ========== */
    let currentStream = null;
    let currentStage = 0;

    const silhouettes = [
      {
        src: "{% static 'images/front.png' %}",
        title: "Front Pose",
        bubble: "Stand back and align your body with the outline",
        hint: "Face the camera with arms slightly away from sides",
        maxHeight: "72vh",
        maxWidth: "40vw"
      },
      {
        src: "{% static 'images/side.png' %}",
        title: "Side Pose",
        bubble: "Turn sideways and align with the outline",
        hint: "Stand sideways with arms relaxed at your sides",
        maxHeight: "72vh",
        maxWidth: "40vw"
      }
    ];

    /* ========== NAVIGATION ========== */
    function goBack() {
      stopCamera();
      window.history.back();
    }

    /* ========== CAMERA ========== */
    function startCamera() {
      const constraints = {
        video: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          facingMode: "user"
        },
        audio: false
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          currentStream = stream;
          video.srcObject = stream;

          video.onloadedmetadata = () => {
            video.play()
              .then(() => {
                loadingOverlay.classList.add("hidden");
                setTimeout(() => {
                  loadStage(0);
                }, 300);
              })
              .catch(err => {
                console.error("Play error:", err);
                statusDiv.innerText = "Could not start video playback.";
                loadingOverlay.classList.add("hidden");
              });
          };
        })
        .catch(err => {
          console.error("Camera error:", err);
          loadingOverlay.classList.add("hidden");

          if (err.name === "NotAllowedError") {
            statusDiv.innerText = "Camera access denied. Please allow camera permissions.";
          } else if (err.name === "NotFoundError") {
            statusDiv.innerText = "No camera found on this device.";
          } else {
            statusDiv.innerText = "Camera unavailable. Please try again.";
          }

          captureBtn.style.display = "none";
          captureHint.innerText = "";
          guideBubble.style.display = "none";
        });
    }

    function stopCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
    }

    /* ========== FLASH EFFECT ========== */
    function flashEffect() {
      flash.classList.add("active");
      return new Promise(resolve => {
        setTimeout(() => {
          flash.classList.remove("active");
          resolve();
        }, 150);
      });
    }

    /* ========== CAPTURE ========== */
    function capture() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      return canvas.toDataURL("image/jpeg", 0.92);
    }

    /* ========== LOAD STAGE ========== */
    function loadStage(stageIndex) {
      currentStage = stageIndex;
      const stage = silhouettes[stageIndex];

      // Update UI text
      pageTitle.innerText = stage.title;
      guideBubble.innerText = stage.bubble;
      captureHint.innerText = stage.hint;
      statusDiv.innerText = "Align yourself within the silhouette...";

      // Update silhouette size
      overlay.style.maxHeight = stage.maxHeight;
      overlay.style.maxWidth = stage.maxWidth;

      // Pulse the silhouette to draw attention
      overlay.classList.add("pulsing");

      // Load the silhouette image
      overlay.src = stage.src;
      overlay.style.display = "block";

      captureBtn.disabled = true;

      let ready = false;

      function onReady() {
        if (ready) return;
        ready = true;
        captureBtn.disabled = false;

        // Stop pulsing after user has had time to see it
        setTimeout(() => {
          overlay.classList.remove("pulsing");
        }, 4000);

        captureBtn.onclick = async () => {
          captureBtn.disabled = true;
          captureBtn.onclick = null;
          await flashEffect();

          if (stageIndex === 0) {
            handleFrontCapture();
          } else {
            handleSideCapture();
          }
        };
      }

      // Wait for image to load
      overlay.onload = () => onReady();
      if (overlay.complete && overlay.naturalWidth > 0) {
        onReady();
      }

      // Safety timeout
      setTimeout(() => onReady(), 3000);
    }

    /* ========== STAGE: FRONT ========== */
    function handleFrontCapture() {
      const data = capture();
      sessionStorage.setItem("front_pose", data);

      dot1.classList.remove("active");
      dot1.classList.add("completed");
      dot2.classList.add("active");

      statusDiv.innerText = "Front captured! Now turn sideways.";
      guideBubble.innerText = "Great! Now turn to your side";

      overlay.classList.remove("pulsing");

      setTimeout(() => {
        loadStage(1);
      }, 1000);
    }

    /* ========== STAGE: SIDE ========== */
    function handleSideCapture() {
      const data = capture();
      sessionStorage.setItem("side_pose", data);

      dot2.classList.remove("active");
      dot2.classList.add("completed");

      statusDiv.innerText = "Processing...";
      captureBtn.style.display = "none";
      captureHint.innerText = "";
      guideBubble.style.display = "none";
      overlay.style.display = "none";

      progressBar.classList.add("visible");
      let progress = 0;
      const interval = setInterval(() => {
        progress += 15;
        progressFill.style.width = Math.min(progress, 90) + "%";
        if (progress >= 90) clearInterval(interval);
      }, 150);

      setTimeout(() => {
        progressFill.style.width = "100%";
        stopCamera();
        window.location.href = "{% url 'measureApp:preview_capture' %}";
      }, 1200);
    }

    /* ========== INIT ========== */
    startCamera();
  </script>

</body>
</html>
